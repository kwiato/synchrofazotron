# Publishes a signed Android App Bundle to Google Play (internal testing) when a
# version tag is pushed. Cut a release with:  git tag v1.2.3 && git push --tags
#
# The per-push debug APK / android-latest sideload flow lives in build-app.yml
# and is untouched by this. Required repo secrets:
#   PLAY_KEYSTORE_B64        base64 of the upload keystore  (base64 -w0 upload-keystore.jks)
#   PLAY_KEYSTORE_PASSWORD   store password
#   PLAY_KEY_ALIAS           key alias (e.g. "upload")
#   PLAY_KEY_PASSWORD        key password
#   PLAY_SERVICE_ACCOUNT_JSON  the Google Cloud service-account JSON (whole file)
name: Release to Play (AAB)

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-play
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'   # Capacitor 7 compiles its libs against Java 21

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/app/package-lock.json

      - name: Install dependencies
        working-directory: web/app
        run: npm ci

      - name: Build the web bundle + sync into the native project
        working-directory: web/app
        env:
          VITE_APP_SHA: ${{ github.sha }}
        run: npm run cap:sync

      - name: Restore the upload keystore + signing config
        working-directory: web/app/android
        env:
          KEYSTORE_B64: ${{ secrets.PLAY_KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.PLAY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.PLAY_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > upload-keystore.jks
          cat > keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Assemble the signed release AAB
        working-directory: web/app/android
        run: |
          # base 100 leaves room below for manual/local uploads (the first,
          # bootstrap upload is versionCode 1); CI stays strictly increasing.
          export ANDROID_VERSION_CODE=$(( 100 + GITHUB_RUN_NUMBER ))
          export ANDROID_VERSION_NAME="${GITHUB_REF_NAME#v}"
          echo "Building versionCode=$ANDROID_VERSION_CODE versionName=$ANDROID_VERSION_NAME"
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload to Play — internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.synchrofazotron.panel
          releaseFiles: web/app/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
