# Rebuilds the Preact control panel (web/app) and compiles the shared SCSS
# (web/ui/style.scss -> style.css), committing the refreshed bundle
# (web/app/dist) and stylesheet back to main, so the static files install.sh
# ships to the Pi always match the source. The Pi has no Node, so the build must
# happen here; the artifacts are committed to the repo (not release assets)
# because install.sh fetches them from raw.githubusercontent.com by fixed path.
name: Build panel (web/app)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      # Source only — deliberately NOT web/app/dist/**, so the commit this job
      # pushes back does not retrigger the workflow. The [skip ci] tag on that
      # commit is a second guard.
      - 'web/app/src/**'
      - 'web/app/index.html'
      - 'web/app/vite.config.js'
      - 'web/app/package.json'
      - 'web/app/package-lock.json'
      # the shared stylesheet is compiled from SCSS by the same build
      - 'web/ui/style.scss'
      # panel changes auto-bump VERSION (the bot commit is [skip ci], so the
      # bump itself cannot retrigger this workflow)
      - 'web/pistream_panel.py'
      - '.github/workflows/build-panel.yml'

permissions:
  contents: write

concurrency:
  group: build-panel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/app/package-lock.json

      - name: Install dependencies
        working-directory: web/app
        run: npm ci

      - name: Build the bundle
        working-directory: web/app
        run: npm run build

      - name: Auto-bump the panel VERSION (patch)
        run: |
          # The About version sat frozen for months because bumping was manual.
          # Every source change now bumps the patch part; minor/major stay a
          # human decision (edit VERSION in web/pistream_panel.py).
          python3 - <<'EOF'
          import re, pathlib
          p = pathlib.Path("web/pistream_panel.py")
          src = p.read_text(encoding="utf-8")
          def bump(m):
              return f'VERSION = "{m[1]}.{m[2]}.{int(m[3]) + 1}"'
          new, n = re.subn(r'VERSION = "(\d+)\.(\d+)\.(\d+)"', bump, src, count=1)
          assert n == 1, "VERSION line not found"
          p.write_text(new, encoding="utf-8")
          print("bumped to", re.search(r'VERSION = "[^"]+"', new)[0])
          EOF

      - name: Commit the refreshed bundle / stylesheet / version if changed
        run: |
          git add web/app/dist web/ui/style.css web/pistream_panel.py
          if git diff --cached --quiet; then
            echo "everything already up to date — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "panel: rebuild /app bundle + bump version [skip ci]"
          git push
