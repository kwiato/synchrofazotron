# Builds the Android APK for the mobile shell (web/app + Capacitor). This
# machine and the Pi have no Android toolchain, so — like build-panel.yml builds
# the web bundle here — the APK is built in CI. Every run uploads the APK as a
# workflow artifact; pushes to main also publish it to the `android-latest`
# prerelease so it can be installed straight from the phone (stable URL).
name: Build app (Android APK)

on:
  workflow_dispatch: {}
  push:
    branches: [main, mobile-app]
    paths:
      - 'web/app/src/**'
      - 'web/app/android/**'
      - 'web/app/index.html'
      - 'web/app/vite.config.js'
      - 'web/app/capacitor.config.json'
      - 'web/app/.env.capacitor'
      - 'web/app/package.json'
      - 'web/app/package-lock.json'
      - 'web/ui/style.scss'
      - '.github/workflows/build-app.yml'

permissions:
  contents: write

concurrency:
  group: build-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'   # Capacitor 7 compiles its libs against Java 21

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/app/package-lock.json

      - name: Install dependencies
        working-directory: web/app
        run: npm ci

      - name: Build the web bundle + sync into the native project
        working-directory: web/app
        env:
          VITE_APP_SHA: ${{ github.sha }}   # in-app updater compares this to the release
        run: npm run cap:sync

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Restore the signing keystore (stable sideload signature)
        working-directory: web/app/android
        env:
          KEYSTORE_B64: ${{ secrets.PLAY_KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.PLAY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.PLAY_KEY_PASSWORD }}
        run: |
          # The .dev debug APK is signed with the same key on every run so a new
          # build installs over the last one instead of forcing an uninstall.
          echo "$KEYSTORE_B64" | base64 -d > upload-keystore.jks
          cat > keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Assemble debug APK
        working-directory: web/app/android
        run: |
          # Monotonic versionCode so the .dev sideload app updates in place. Kept in
          # its own band, well clear of the release track's (100 + run_number).
          export ANDROID_VERSION_CODE=$(( 1000 + GITHUB_RUN_NUMBER ))
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: synchrofazotron-debug-apk
          path: web/app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Write version.json (the in-app updater checks this)
        if: github.ref == 'refs/heads/main'
        run: |
          printf '{"sha":"%s","built":"%s"}\n' \
            "${{ github.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json

      - name: Publish to the android-latest prerelease (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android app (latest)
          prerelease: true
          body: ${{ github.sha }}   # the in-app updater reads the build SHA from here
          files: |
            web/app/android/app/build/outputs/apk/debug/app-debug.apk
            version.json
