name: Build native app (Android APK)

# Builds the truly-native Kotlin/Compose app in android/ (a peer to the
# Capacitor app in web/app/android). Debug/unsigned APK as an artifact, plus a
# rolling prerelease on main for sideloading.

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-native.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        working-directory: android
        run: |
          export ANDROID_VERSION_CODE=$((2000 + GITHUB_RUN_NUMBER))
          export ANDROID_VERSION_NAME="0.1.${GITHUB_RUN_NUMBER}"
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        working-directory: android
        run: cp app/build/outputs/apk/debug/app-debug.apk native-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: synchrofazotron-native-debug-apk
          path: android/native-debug.apk

      # On main: publish to a stable rolling prerelease for sideloading.
      - name: Publish rolling prerelease
        if: github.ref == 'refs/heads/main'
        working-directory: android
        run: printf '{"sha":"%s","built":"%s"}\n' "$GITHUB_SHA" "$(date -u +%FT%TZ)" > version.json
      - name: Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-native-latest
          name: Native app (rolling)
          prerelease: true
          body: ${{ github.sha }}
          files: |
            android/native-debug.apk
            android/version.json
