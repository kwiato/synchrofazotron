<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Synchrofazotron</title>
  <!-- Shared theme — one source of truth, served raw by the panel. -->
  <link rel="stylesheet" href="/static/style.css">
  <!-- apply the saved theme before first paint (no flash) -->
  <script>try{var t=localStorage.getItem('theme');if(t&&t!=='neon')document.documentElement.dataset.theme=t;}catch(e){}</script>
  <script type="module" crossorigin src="/app/assets/index.js"></script>
  <link rel="stylesheet" crossorigin href="/app/assets/index.css">
</head>
<body class="has-playerbar">
  <div id="app"></div>
</body>
</html>
