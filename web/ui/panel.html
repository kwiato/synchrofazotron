<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{DEVICE}} — {{T:title_panel}}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="has-playerbar">
<div class="wrap">
  <header class="top">
    <h1><a class="brand" href="/">{{DEVICE}}</a></h1>
    <div class="topbtns">
      <button id="pairBtn" class="iconbtn" title="{{T:bt_button}}">
        <i class="ico ico-bt" aria-hidden="true"></i>
        <span id="pairLabel">{{T:pair_short}}</span>
      </button>
      <a class="iconbtn" href="/settings" title="{{T:settings_link_title}}" aria-label="{{T:settings_link_title}}">
        <i class="ico ico-cog" aria-hidden="true"></i>
      </a>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" id="tabBtnNow" data-tab="now">{{T:tab_now}}</button>
    <button class="tab" id="tabBtnViz" data-tab="viz">{{T:tab_viz}}</button>
  </nav>

  <section id="tab-now">
    <div id="warn" class="card note" style="display:none;">{{T:warn_multi}}</div>
    <div class="now">
      <div id="art" class="art">
        <span class="eq off"><i></i><i></i><i></i><i></i><i></i></span>
      </div>
      <div id="nowTitle" class="now-title">…</div>
      <div id="nowSub" class="now-sub muted"></div>
    </div>
  </section>

  <section id="tab-viz" style="display:none;">
    <div class="card">
      <p id="vizNA" class="muted" style="display:none;">{{T:viz_missing}}</p>
      <div id="vizBody">
        <div class="lrow">
          <button class="btn sec" id="engCava">{{T:viz_eng_cava}}</button>
          <button class="btn sec" id="engGlsl">{{T:viz_eng_glsl}}</button>
        </div>
        <p id="vizErr" class="muted"></p>
        <div id="vizList" class="vgrid"></div>
        <button class="btn sec" id="vizToggle">…</button>
        <p id="vizMsg" class="muted"></p>
        <p class="muted small">{{T:viz_more}}</p>
      </div>
    </div>
  </section>
</div>

<div class="playerbar">
  <div class="pbwrap" id="pbwrap">
    <div id="sheet" class="sheet">
      <div class="sheet-head">{{T:sheet_sources}}</div>
      <div id="sheetList"></div>
      <p id="dacline" class="muted small"></p>
      <p class="muted small">{{T:sources_note}}</p>
    </div>
    <div class="inner">
      <button id="srcArrow" class="iconbtn arrow" title="{{T:sheet_sources}}" aria-label="{{T:sheet_sources}}">
        <i class="ico ico-chev" aria-hidden="true"></i>
      </button>
      <span id="pbEq" class="eq off"><i></i><i></i><i></i></span>
      <div class="pb-info">
        <div id="pbTitle" class="pb-title">…</div>
        <div id="pbSub" class="pb-sub muted"></div>
      </div>
      <button id="pbPrev" class="pbskip" disabled aria-label="prev">
        <i class="ico ico-prev" aria-hidden="true"></i>
      </button>
      <button id="pbPlay" class="playbtn" disabled>
        <i id="pbIconPlay" class="ico ico-play ico-lg" aria-hidden="true"></i>
        <i id="pbIconPause" class="ico ico-pause ico-lg" style="display:none;" aria-hidden="true"></i>
      </button>
      <button id="pbNext" class="pbskip" disabled aria-label="next">
        <i class="ico ico-next" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>

<script src="/static/common.js"></script>
<script src="/static/panel.js"></script>
</body>
</html>
