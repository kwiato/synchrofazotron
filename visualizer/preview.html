<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shader Studio — Synchrofazotron</title>
<!--
  Shader studio for the Synchrofazotron visualizer presets (visualizer/glsl/).

  WebGL 1 compiles the same GLSL ES 1.00 dialect that Mesa enforces on the
  Pi Zero 2 W (VC4), so a shader that compiles here compiles there.
  Uniform contract (same as glsl-audio-bridge.py):
    u_resolution vec2, u_time float,
    u_level / u_bass / u_mid / u_treble float 0..1 (fast attack, slow decay).

  Shader sources are embedded as a fallback so the page works from file://
  (and as a claude.ai artifact); served over http from the repo root or the
  visualizer/ dir it fetches the fresh glsl/*.frag files instead.
  Drafts are saved in the browser (localStorage). "Watch .frag" (Chrome/Edge)
  reloads a local file on every save, so you can edit in your editor.

  This file is generated from studio_template.html + glsl sources; editing it
  directly is fine too - the embedded sources are only a fallback.
-->
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: #0f1216; color: #e7ecf2; }
  #app {
    display: flex; flex-direction: column; height: 100dvh;
    font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
  }
  header {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 8px 14px; background: #12161c; border-bottom: 1px solid #232b35;
  }
  header .brand { font-weight: 600; white-space: nowrap; }
  .badge {
    font-weight: 400; font-size: .76rem; color: #8b97a6;
    border: 1px solid #2b3440; border-radius: 999px; padding: 2px 9px;
  }
  #curName { font-family: ui-monospace, Consolas, monospace; color: #7fd0ff; }
  #curStatus { font-size: .8rem; }
  #curStatus.ok { color: #34d399; }
  #curStatus.bad { color: #ff9aa2; }
  #curStatus.dirty { color: #fbbf24; }
  header .actions { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
  button, select {
    background: #2b3440; color: #cfd6dd; border: 0; border-radius: 8px;
    padding: 6px 12px; font: inherit; font-size: .84rem; cursor: pointer;
  }
  button:hover, select:hover { background: #374151; color: #fff; }
  button:focus-visible, select:focus-visible, textarea:focus-visible,
  .item:focus-visible { outline: 2px solid #6db3ff; outline-offset: 1px; }
  button.primary { background: #2563eb; color: #fff; }
  button.primary:hover { background: #1d4ed8; }
  button.on { background: #059669; color: #fff; }
  button:disabled { opacity: .4; cursor: default; }

  #body { flex: 1; display: flex; min-height: 0; }
  aside {
    width: 200px; flex: none; overflow-y: auto; padding: 10px;
    background: #12161c; border-right: 1px solid #232b35;
  }
  aside .sect {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
    color: #8b97a6; margin: 10px 4px 6px;
  }
  .item {
    display: flex; align-items: center; gap: 8px; width: 100%;
    text-align: left; padding: 8px 10px; border-radius: 9px; margin: 2px 0;
    background: none; color: #c4cad3; font-family: ui-monospace, Consolas, monospace;
    font-size: .85rem;
  }
  .item:hover { background: #1d242c; color: #fff; }
  .item.active { background: #2563eb; color: #fff; }
  .item .mark { margin-left: auto; font-size: .7rem; color: #fbbf24; }
  .item.active .mark { color: #fde68a; }

  main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  #stageWrap { padding: 12px 12px 0; }
  #stage {
    position: relative; width: 100%; aspect-ratio: 16 / 9; max-height: 46vh;
    margin: 0 auto; background: #000; border: 1px solid #232b35;
    border-radius: 10px; overflow: hidden;
  }
  canvas { width: 100%; height: 100%; display: block; }
  #hud {
    position: absolute; top: 8px; right: 10px; background: #000a;
    padding: 2px 8px; border-radius: 6px; color: #9fb;
    font: 12px ui-monospace, Consolas, monospace;
  }
  #controls {
    display: flex; align-items: center; gap: 8px 14px; flex-wrap: wrap;
    padding: 8px 12px;
  }
  #controls label {
    display: flex; align-items: center; gap: 6px;
    font: 12px ui-monospace, Consolas, monospace; color: #8b97a6;
  }
  input[type=range] { width: 80px; accent-color: #2563eb; }
  .bar {
    display: inline-block; width: 54px; height: 8px; background: #1d242b;
    border-radius: 3px; overflow: hidden; vertical-align: middle;
  }
  .bar i { display: block; height: 100%; width: 0;
    background: linear-gradient(90deg, #2563eb, #34d399); }
  .val { display: inline-block; width: 4ch; color: #9fb; text-align: right; }

  #editorWrap {
    flex: 1; display: flex; min-height: 140px; margin: 4px 12px 0;
    border: 1px solid #232b35; border-radius: 10px 10px 0 0; overflow: hidden;
    background: #0b0e12;
  }
  #gutter {
    padding: 10px 6px 10px 12px; text-align: right; color: #3f4a57;
    font: 13px/1.5 ui-monospace, Consolas, monospace; user-select: none;
    overflow: hidden; white-space: pre;
  }
  #code {
    flex: 1; border: 0; resize: none; padding: 10px 12px 10px 8px;
    background: transparent; color: #dbe4ee; caret-color: #7fd0ff;
    font: 13px/1.5 ui-monospace, Consolas, monospace;
    white-space: pre; overflow-wrap: normal; overflow-x: auto;
  }
  #code:focus { outline: none; }
  #err {
    display: none; margin: 0 12px 12px; padding: 8px 12px; max-height: 18vh;
    overflow: auto; background: #2a1114; color: #ff9aa2;
    border: 1px solid #a33; border-top: 0; border-radius: 0 0 10px 10px;
    font: 12px/1.5 ui-monospace, Consolas, monospace; white-space: pre-wrap;
  }
  #editorWrap.errored { border-color: #a33; }
  main > #editorWrap:not(.errored) { border-radius: 10px; margin-bottom: 12px; }

  @media (max-width: 760px) {
    #body { flex-direction: column; }
    aside {
      width: auto; display: flex; gap: 4px; overflow-x: auto;
      border-right: 0; border-bottom: 1px solid #232b35; padding: 6px 10px;
    }
    aside .sect { display: none; }
    .item { width: auto; white-space: nowrap; }
    #stage { max-height: 34vh; }
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <span class="brand">🌈 Shader Studio</span>
    <span class="badge">GLSL ES 1.00 — viz-glsl contract</span>
    <span id="curName"></span>
    <span id="curStatus"></span>
    <span class="actions">
      <button id="saveBtn" class="primary" title="Saves the current code as a draft in this browser">Save as draft</button>
      <button id="resetSrcBtn" title="Restores the repo version">Restore original</button>
      <button id="delBtn" title="Removes the draft from this browser">Delete draft</button>
      <button id="copyBtn" title="Copies the code to the clipboard">Copy</button>
      <button id="dlBtn" title="Downloads a .frag file">Download .frag</button>
    </span>
  </header>
  <div id="body">
    <aside>
      <div class="sect">On the Pi (repo)</div>
      <div id="listBuiltin"></div>
      <div class="sect">Drafts (this browser)</div>
      <div id="listDrafts"></div>
    </aside>
    <main>
      <div id="stageWrap">
        <div id="stage">
          <canvas id="gl"></canvas>
          <div id="hud">— fps</div>
        </div>
      </div>
      <div id="controls">
        <select id="audioMode" title="Audio source for the uniforms">
          <option value="beat">audio: fake beat</option>
          <option value="mic">audio: microphone</option>
          <option value="manual">audio: sliders</option>
        </select>
        <select id="resScale" title="Render scale (the Pi renders 1080p)">
          <option value="1">1×</option>
          <option value="0.5" selected>0.5×</option>
          <option value="0.25">0.25×</option>
        </select>
        <button id="pauseBtn">pause</button>
        <button id="tzeroBtn" title="restart u_time">t=0</button>
        <button id="watchBtn" title="Chrome/Edge: pick a local .frag and recompile on every save">Watch .frag</button>
        <label>u_level <span class="bar"><i id="b0"></i></span><input type="range" id="s0" min="0" max="1" step="0.01" value="0.6"><span class="val" id="v0"></span></label>
        <label>u_bass <span class="bar"><i id="b1"></i></span><input type="range" id="s1" min="0" max="1" step="0.01" value="0.5"><span class="val" id="v1"></span></label>
        <label>u_mid <span class="bar"><i id="b2"></i></span><input type="range" id="s2" min="0" max="1" step="0.01" value="0.4"><span class="val" id="v2"></span></label>
        <label>u_treble <span class="bar"><i id="b3"></i></span><input type="range" id="s3" min="0" max="1" step="0.01" value="0.3"><span class="val" id="v3"></span></label>
      </div>
      <div id="editorWrap">
        <div id="gutter">1</div>
        <textarea id="code" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
      </div>
      <div id="err"></div>
    </main>
  </div>
</div>

<script>
"use strict";

// Embedded fallback sources (so file:// and the artifact work offline);
// over http the fresh repo files are fetched on load, see refreshFromRepo().
const BUILTINS = {"plasma": "// Synchrofazotron glsl preset: plasma — classic demoscene sine plasma.\n// Audio uniforms come from glsl-audio-bridge.py (0..1, fast attack/slow decay).\n#ifdef GL_ES\nprecision mediump float;\n#endif\n\nuniform vec2 u_resolution;\nuniform float u_time;\nuniform float u_level;\nuniform float u_bass;\nuniform float u_mid;\nuniform float u_treble;\n\nvoid main() {\n    vec2 p = (2.0 * gl_FragCoord.xy - u_resolution) / min(u_resolution.x, u_resolution.y);\n    float t = u_time * 0.7 + u_bass * 3.0;\n    float v = sin(p.x * 3.0 + t)\n            + sin(p.y * 4.0 - t * 1.3)\n            + sin((p.x + p.y) * 2.5 + t * 0.7)\n            + sin(length(p) * (5.0 + 3.0 * u_mid) - t * 2.0);\n    vec3 col = 0.5 + 0.5 * cos(3.14159 * v + vec3(0.0, 2.094, 4.188) + u_time * 0.3);\n    col *= 0.4 + 0.9 * u_level;\n    gl_FragColor = vec4(col, 1.0);\n}\n", "tunnel": "// Synchrofazotron glsl preset: tunnel — checkerboard fly-through, bass = speed.\n#ifdef GL_ES\nprecision mediump float;\n#endif\n\nuniform vec2 u_resolution;\nuniform float u_time;\nuniform float u_level;\nuniform float u_bass;\nuniform float u_mid;\nuniform float u_treble;\n\nvoid main() {\n    vec2 p = (2.0 * gl_FragCoord.xy - u_resolution) / min(u_resolution.x, u_resolution.y);\n    float a = atan(p.y, p.x);\n    float r = max(length(p), 1e-3);\n    float t = u_time * (0.6 + 1.5 * u_bass);\n    float x = 0.4 / r + t;               // depth along the tunnel\n    float y = a * 3.8197;                // 12 segments around (12 / pi)\n    float c = mod(floor(x * 4.0) + floor(y), 2.0);\n    vec3 col = mix(vec3(0.10, 0.00, 0.25), vec3(1.00, 0.20, 0.90), c);\n    col = mix(col, vec3(0.2, 1.0, 1.0), u_treble * 0.5);\n    col *= (0.3 + 0.9 * u_level) * smoothstep(0.0, 0.35, r);  // dark core = depth\n    gl_FragColor = vec4(col, 1.0);\n}\n", "copper": "// Synchrofazotron glsl preset: copper — Amiga copper bars + scanlines.\n#ifdef GL_ES\nprecision mediump float;\n#endif\n\nuniform vec2 u_resolution;\nuniform float u_time;\nuniform float u_level;\nuniform float u_bass;\nuniform float u_mid;\nuniform float u_treble;\n\nvec3 bar(vec2 uv, float phase, float speed, vec3 tint) {\n    float y = 0.5 + 0.38 * sin(u_time * speed + phase) * (0.6 + 0.8 * u_bass);\n    float d = abs(uv.y - y);\n    return tint * smoothstep(0.09, 0.0, d) * (0.5 + 0.9 * u_level);\n}\n\nvoid main() {\n    vec2 uv = gl_FragCoord.xy / u_resolution;\n    vec3 col = vec3(0.02, 0.00, 0.05);\n    col += bar(uv, 0.0, 1.1, vec3(1.0, 0.1, 0.1));\n    col += bar(uv, 1.3, 1.4, vec3(1.0, 0.6, 0.0));\n    col += bar(uv, 2.6, 1.7, vec3(0.1, 1.0, 0.2));\n    col += bar(uv, 3.9, 2.0, vec3(0.1, 0.4, 1.0));\n    col += bar(uv, 5.2, 2.3, vec3(0.8, 0.1, 1.0));\n    col *= 0.85 + 0.15 * sin(gl_FragCoord.y * 3.14159);  // CRT scanlines\n    gl_FragColor = vec4(col, 1.0);\n}\n"};
const SEED_DRAFTS = {"glyphs": "// Synchrofazotron glsl preset: glyphs — noise-driven typographic grid\n// (dots / slashes / crosses / squares), white on black.\n// Inspired by the glslViewer live-coding demo. Audio uniforms come from\n// glsl-audio-bridge.py (0..1, fast attack / slow decay).\n#ifdef GL_ES\nprecision mediump float;\n#endif\n\nuniform vec2 u_resolution;\nuniform float u_time;\nuniform float u_level;\nuniform float u_bass;\nuniform float u_mid;\nuniform float u_treble;\n\nfloat hash(vec2 p) {\n    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);\n}\n\nfloat vnoise(vec2 p) {\n    vec2 i = floor(p), f = fract(p);\n    vec2 u = f * f * (3.0 - 2.0 * f);\n    return mix(mix(hash(i),               hash(i + vec2(1.0, 0.0)), u.x),\n               mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);\n}\n\n// distance-based stroke from a to b in cell space (uv 0..1)\nfloat stroke(vec2 uv, vec2 a, vec2 b, float w) {\n    vec2 pa = uv - a, ba = b - a;\n    float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);\n    return smoothstep(w, w - 0.05, length(pa - ba * h));\n}\n\nvoid main() {\n    float rows = 19.0;                       // glyph rows on screen\n    float cellPx = u_resolution.y / rows;\n    vec2 cell = floor(gl_FragCoord.xy / cellPx);\n    vec2 uv = fract(gl_FragCoord.xy / cellPx);\n\n    // slow drifting field decides which glyph lives in a cell;\n    // mid nudges the field scale, treble sprinkles per-cell flicker,\n    // bass promotes cells to heavier glyphs (squares bloom on kicks)\n    float t = u_time * 0.35;\n    float n = vnoise(cell * (0.23 + 0.05 * u_mid) + vec2(t, t * 0.37));\n    n += (hash(cell + floor(u_time * 6.0)) - 0.5) * 0.30 * u_treble;\n    n += 0.22 * u_bass;\n\n    float g = 0.0;\n    if (n > 0.76) {                          // filled square\n        vec2 q = abs(uv - 0.5);\n        g = step(max(q.x, q.y), 0.33);\n    } else if (n > 0.64) {                   // cross ×\n        g = max(stroke(uv, vec2(0.22, 0.22), vec2(0.78, 0.78), 0.065),\n                stroke(uv, vec2(0.22, 0.78), vec2(0.78, 0.22), 0.065));\n    } else if (n > 0.46) {                   // slash /\n        g = stroke(uv, vec2(0.24, 0.18), vec2(0.76, 0.82), 0.065);\n    } else if (n > 0.30) {                   // dot ·\n        vec2 q = abs(uv - 0.5);\n        g = step(max(q.x, q.y), 0.055);\n    }                                        // else: empty cell\n\n    float bright = 0.55 + 0.45 * u_level;\n    gl_FragColor = vec4(vec3(g * bright), 1.0);\n}\n"};

const LS_KEY = "sf.shader.drafts";
let drafts = {};
try { drafts = JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch (e) {}
// first run: seed the work-in-progress draft(s) so there is something to play with
for (const n in SEED_DRAFTS)
  if (!(n in drafts) && !localStorage.getItem(LS_KEY + ".seeded." + n)) {
    drafts[n] = { src: SEED_DRAFTS[n] };
    try { localStorage.setItem(LS_KEY + ".seeded." + n, "1"); } catch (e) {}
  }
function persist() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(drafts)); } catch (e) {}
}

const session = {};        // unsaved edits of builtins (this tab only)
let cur = null;            // current shader name
let compileOk = true;
let watchHandle = null, watchStamp = 0, watchName = "";

const $ = id => document.getElementById(id);
const codeEl = $("code"), gutter = $("gutter"), errBox = $("err");

// --- WebGL ---------------------------------------------------------------
const canvas = $("gl");
const gl = canvas.getContext("webgl", { antialias: false });
const VERT = "attribute vec2 a_pos; void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }";
let program = null, uniformLoc = {};

const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

function compile(src) {
  const mk = (type, s) => {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, s);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(sh);
    return sh;
  };
  try {
    const p = gl.createProgram();
    gl.attachShader(p, mk(gl.VERTEX_SHADER, VERT));
    gl.attachShader(p, mk(gl.FRAGMENT_SHADER, src));
    gl.bindAttribLocation(p, 0, "a_pos");
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw gl.getProgramInfoLog(p);
    if (program) gl.deleteProgram(program);
    program = p;
    gl.useProgram(p);
    uniformLoc = {};
    for (const u of ["u_resolution", "u_time", "u_level", "u_bass", "u_mid", "u_treble"])
      uniformLoc[u] = gl.getUniformLocation(p, u);
    compileOk = true;
    errBox.style.display = "none";
    $("editorWrap").classList.remove("errored");
  } catch (e) {
    compileOk = false;
    errBox.textContent = "" + e;    // Mesa on the Pi reports the same 0:LINE(col) positions
    errBox.style.display = "block";
    $("editorWrap").classList.add("errored");
  }
  updateStatus();
}

// --- shader library ------------------------------------------------------
function srcOf(name) {
  if (name in drafts) return drafts[name].src;
  if (name in session) return session[name];
  return BUILTINS[name];
}
function isDraft(name) { return name in drafts; }
function isDirty(name) { return name in session && session[name] !== BUILTINS[name]; }

function renderList() {
  const mkItem = (name, mark) => {
    const b = document.createElement("button");
    b.className = "item" + (name === cur && !watchHandle ? " active" : "");
    b.textContent = name;
    if (mark) {
      const s = document.createElement("span");
      s.className = "mark"; s.textContent = mark;
      b.appendChild(s);
    }
    b.onclick = () => select(name);
    return b;
  };
  const lb = $("listBuiltin"); lb.innerHTML = "";
  Object.keys(BUILTINS).forEach(n => lb.appendChild(mkItem(n, isDirty(n) ? "✎" : "")));
  const ld = $("listDrafts"); ld.innerHTML = "";
  const names = Object.keys(drafts).sort();
  if (!names.length) {
    const p = document.createElement("div");
    p.style.cssText = "color:#8b97a6;font-size:.8rem;padding:4px 10px;";
    p.textContent = "no drafts yet";
    ld.appendChild(p);
  }
  names.forEach(n => ld.appendChild(mkItem(n, "draft")));
}

function updateStatus() {
  $("curName").textContent = watchHandle ? watchName + " (watching)" : cur + ".frag";
  const st = $("curStatus");
  if (!compileOk) { st.textContent = "● compile error"; st.className = "bad"; }
  else if (!watchHandle && isDirty(cur)) { st.textContent = "● modified (unsaved)"; st.className = "dirty"; }
  else { st.textContent = "● OK"; st.className = "ok"; }
  $("delBtn").disabled = !isDraft(cur) || !!watchHandle;
  $("resetSrcBtn").disabled = !!watchHandle || !(cur in BUILTINS) || !isDirty(cur);
}

function select(name) {
  stopWatch();
  cur = name;
  codeEl.value = srcOf(name);
  syncGutter();
  compile(codeEl.value);
  renderList();
}

// served over http next to the repo: refresh the embedded copies
(function refreshFromRepo() {
  if (location.protocol === "file:") return;
  Object.keys(BUILTINS).forEach(n => fetch("glsl/" + n + ".frag")
    .then(r => { if (!r.ok) throw 0; return r.text(); })
    .then(t => {
      BUILTINS[n] = t;
      if (cur === n && !isDraft(n) && !isDirty(n) && !watchHandle) {
        codeEl.value = t; syncGutter(); compile(t);
      }
    })
    .catch(() => {}));
})();

// --- editor --------------------------------------------------------------
function syncGutter() {
  const n = codeEl.value.split("\n").length;
  let s = "";
  for (let i = 1; i <= n; i++) s += i + "\n";
  gutter.textContent = s;
  gutter.scrollTop = codeEl.scrollTop;
}
codeEl.addEventListener("scroll", () => { gutter.scrollTop = codeEl.scrollTop; });
codeEl.addEventListener("keydown", e => {
  if (e.key === "Tab") {
    e.preventDefault();
    const [a, b] = [codeEl.selectionStart, codeEl.selectionEnd];
    codeEl.setRangeText("  ", a, b, "end");
    onEdit();
  }
});
let debounceT = null;
codeEl.addEventListener("input", onEdit);
function onEdit() {
  stopWatch();                       // editing in the browser takes over
  const src = codeEl.value;
  if (isDraft(cur)) { drafts[cur].src = src; persist(); }
  else session[cur] = src;
  syncGutter();
  clearTimeout(debounceT);
  debounceT = setTimeout(() => { compile(src); renderList(); }, 350);
}

// --- watch a local .frag (Chrome/Edge) ------------------------------------
function stopWatch() {
  if (!watchHandle) return;
  watchHandle = null;
  $("watchBtn").classList.remove("on");
}
$("watchBtn").onclick = async () => {
  if (!window.showOpenFilePicker) { alert("File watching needs Chrome/Edge."); return; }
  try {
    const [h] = await window.showOpenFilePicker({
      types: [{ description: "fragment shader", accept: { "text/plain": [".frag", ".glsl", ".fs"] } }] });
    watchHandle = h; watchStamp = 0;
    $("watchBtn").classList.add("on");
    renderList();
  } catch (e) {}                     // picker cancelled
};
setInterval(async () => {            // recompile on save: poll mtime at 2 Hz
  if (!watchHandle) return;
  const f = await watchHandle.getFile();
  if (f.lastModified !== watchStamp) {
    watchStamp = f.lastModified;
    watchName = f.name;
    codeEl.value = await f.text();
    syncGutter();
    compile(codeEl.value);
  }
}, 500);

// --- actions -------------------------------------------------------------
function sanitizeName(s) {
  return (s || "").toLowerCase().trim().replace(/\.frag$/, "")
    .replace(/[^a-z0-9_-]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 32);
}
$("saveBtn").onclick = () => {
  let name = sanitizeName(prompt("Draft name (the .frag file name):", isDraft(cur) ? cur : cur + "-v2"));
  if (!name) return;
  if (name in BUILTINS) { alert("That name belongs to a repo shader — pick another one."); return; }
  if (name in drafts && name !== cur && !confirm("Draft „" + name + "” exists. Overwrite?")) return;
  drafts[name] = { src: codeEl.value };
  persist();
  if (cur in session) delete session[cur];
  select(name);
};
$("delBtn").onclick = () => {
  if (!isDraft(cur) || !confirm("Delete draft „" + cur + "”?")) return;
  delete drafts[cur];
  persist();
  select(Object.keys(BUILTINS)[0]);
};
$("resetSrcBtn").onclick = () => {
  if (!(cur in BUILTINS)) return;
  delete session[cur];
  select(cur);
};
$("copyBtn").onclick = async () => {
  try { await navigator.clipboard.writeText(codeEl.value); $("copyBtn").textContent = "Copied ✓"; }
  catch (e) { $("copyBtn").textContent = "Clipboard error"; }
  setTimeout(() => { $("copyBtn").textContent = "Copy"; }, 1500);
};
$("dlBtn").onclick = () => {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([codeEl.value], { type: "text/plain" }));
  a.download = (watchHandle ? watchName.replace(/\.frag$/, "") : cur) + ".frag";
  a.click();
  URL.revokeObjectURL(a.href);
};

// --- audio emulation (mirrors glsl-audio-bridge.py) -----------------------
const DECAY = 0.85, GAINS = [3, 40, 60, 120], BANDS = [[20, 250], [250, 2000], [2000, 8000]];
const audioState = [0, 0, 0, 0];   // u_level, u_bass, u_mid, u_treble
let analyser = null, fftBuf = null, audioCtx = null;

function beatSample(t) {           // synthetic 120 BPM groove
  const beat = t * 2.0;
  const kick = Math.exp(-6 * (beat % 1));
  const mid = 0.3 + 0.25 * Math.sin(t * 2.1) + 0.15 * Math.sin(t * 6.7);
  const hat = ((beat + 0.5) % 1 < 0.12 ? 0.8 : 0.1) + 0.1 * Math.sin(t * 31);
  return [0.35 + 0.5 * kick, kick, Math.max(0, mid), Math.max(0, hat)];
}
async function enableMic() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  fftBuf = new Float32Array(analyser.frequencyBinCount);
}
function micSample() {
  analyser.getFloatFrequencyData(fftBuf);
  const hzPerBin = audioCtx.sampleRate / analyser.fftSize;
  const vals = [0, 0, 0, 0];
  let total = 0;
  BANDS.forEach(([lo, hi], i) => {
    let sum = 0, n = 0;
    for (let b = Math.ceil(lo / hzPerBin); b < hi / hzPerBin && b < fftBuf.length; b++, n++)
      sum += Math.pow(10, fftBuf[b] / 20) ** 2;   // dB -> linear power
    vals[i + 1] = n ? Math.sqrt(sum / n) * 4 : 0;
    total += sum;
  });
  vals[0] = Math.sqrt(total / 300);
  return vals;
}
let lastAudioTick = 0, agcEnv = 0;
function updateAudio(now, t) {
  if (now - lastAudioTick < 1000 / 43) return;    // bridge cadence
  lastAudioTick = now;
  const mode = $("audioMode").value;
  let vals;
  if (mode === "manual") {
    for (let i = 0; i < 4; i++) audioState[i] = +$("s" + i).value;
    return;
  } else if (mode === "mic" && analyser) {
    vals = micSample();
  } else {
    vals = beatSample(t);
  }
  let gained = vals.map((v, i) => v * GAINS[i] * (mode === "mic" ? 1 : 0.34));
  if (mode === "mic") {
    // same AGC as glsl-audio-bridge.py: normalize by a running level peak
    agcEnv = Math.max(agcEnv * 0.999, gained[0]);
    const scale = 0.9 / Math.max(agcEnv, 0.02);
    gained = gained.map(v => v * scale);
  }
  for (let i = 0; i < 4; i++) {
    const v = Math.min(gained[i], 1);
    audioState[i] = v > audioState[i] ? v : audioState[i] * DECAY + v * (1 - DECAY);
  }
}
$("audioMode").onchange = e => {
  if (e.target.value === "mic" && !analyser)
    enableMic().catch(() => { alert("Microphone unavailable"); e.target.value = "beat"; });
};

// --- main loop -----------------------------------------------------------
let startTime = performance.now(), pausedAt = null;
let frames = 0, fpsStamp = performance.now();

$("pauseBtn").onclick = e => {
  if (pausedAt === null) { pausedAt = performance.now(); e.target.textContent = "run"; e.target.classList.add("on"); }
  else { startTime += performance.now() - pausedAt; pausedAt = null; e.target.textContent = "pause"; e.target.classList.remove("on"); }
};
$("tzeroBtn").onclick = () => { startTime = performance.now(); if (pausedAt !== null) pausedAt = startTime; };

function frame(now) {
  requestAnimationFrame(frame);
  if (!program || pausedAt !== null) return;
  const scale = +$("resScale").value;
  const w = Math.round(canvas.clientWidth * devicePixelRatio * scale);
  const h = Math.round(canvas.clientHeight * devicePixelRatio * scale);
  if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; gl.viewport(0, 0, w, h); }
  const t = (now - startTime) / 1000;
  updateAudio(now, t);
  gl.uniform2f(uniformLoc.u_resolution, w, h);
  gl.uniform1f(uniformLoc.u_time, t);
  ["u_level", "u_bass", "u_mid", "u_treble"].forEach((u, i) => {
    gl.uniform1f(uniformLoc[u], audioState[i]);
    $("b" + i).style.width = (audioState[i] * 100) + "%";
    $("v" + i).textContent = audioState[i].toFixed(2);
  });
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  frames++;
  if (now - fpsStamp > 500) {
    $("hud").textContent = Math.round(frames * 1000 / (now - fpsStamp)) + " fps @ " + w + "×" + h;
    frames = 0; fpsStamp = now;
  }
}

renderList();
select("glyphs" in drafts ? "glyphs" : Object.keys(BUILTINS)[0]);
requestAnimationFrame(frame);
</script>
