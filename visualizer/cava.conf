# Konfiguracja cava dla PiStream — czyta kopię strumienia z pętli snd-aloop.
# Pełna dokumentacja opcji: https://github.com/karlstav/cava

[general]
framerate = 30
autosens = 1
; bars = 0 -> automatycznie do szerokości konsoli
bars = 0
bar_width = 2
bar_spacing = 1

[input]
method = alsa
; plughw (nie hw): plug dostosuje się do częstotliwości, z jaką gra źródło
source = plughw:Loopback,1,0

[output]
; noncurses (nie ncurses!) — debianowa paczka cava jest zbudowana bez ncurses
method = noncurses
; konsola linuksowa (TERM=linux) ma ubogą paletę — trzymamy się prostych kolorów
channels = stereo

[color]
background = black
foreground = cyan

[smoothing]
noise_reduction = 77
