# cava configuration for Synchrofazotron — reads the stream copy from the snd-aloop loopback.
# Full option reference: https://github.com/karlstav/cava

[general]
; cava is cheap even on the Zero 2 W — 30 fps looked sluggish
framerate = 45
autosens = 1
; bars = 0 -> automatically fit the console width
bars = 0
bar_width = 9
bar_spacing = 2

[input]
method = alsa
; plughw (not hw): plug adapts to whatever sample rate the source plays at
source = plughw:Loopback,1,0

[output]
; noncurses (not ncurses!) — the Debian cava package is built without ncurses
method = noncurses
; the Linux console (TERM=linux) has a poor palette — stick to simple colors
channels = stereo

[color]
background = black
foreground = magenta

[smoothing]
; low = snappy bars (higher values smooth/slow the movement down)
noise_reduction = 10
