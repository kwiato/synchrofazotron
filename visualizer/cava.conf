# preset: snappy (managed by the Synchrofazotron panel — /settings page)
# First-launch default = the first built-in preset (Snappy). The panel rewrites
# this file when you pick or edit a preset in /settings → Visualizer; until then
# hand-edits here are respected. Full option reference: https://github.com/karlstav/cava

[general]
; cava is cheap even on the Zero 2 W — 30 fps looked sluggish
framerate = 60
autosens = 1
; bars = 0 -> automatically fit the console width
bars = 0
bar_width = 1
bar_spacing = 1

[input]
method = alsa
; plughw (not hw): plug adapts to whatever sample rate the source plays at
source = plughw:Loopback,1,0

[output]
; noncurses (not ncurses!) — the Debian cava package is built without ncurses
method = noncurses
; the Linux console (TERM=linux) has a poor palette — stick to simple colors
channels = stereo

[color]
background = black
foreground = white

[smoothing]
; low = snappy bars (higher values smooth/slow the movement down)
noise_reduction = 10
