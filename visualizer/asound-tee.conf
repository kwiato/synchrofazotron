# PISTREAM-VIZ BEGIN (blok zarządzany przez visualizer/install.sh — nie edytuj ręcznie)
# Urządzenie "pistream": gra na DAC i równolegle kopiuje strumień do pętli
# snd-aloop, z której czyta wizualizer (cava). Źródła audio (squeezelite,
# shairport, bluealsa-aplay) celują w "pistream" zamiast wprost w hw:BossDAC.

pcm.pistream_dac {
    type hw
    card BossDAC
    device 0
}

pcm.pistream_loop {
    type hw
    card Loopback
    device 0
    subdevice 0
}

# multi skleja oba urządzenia w jedno 4-kanałowe...
pcm.pistream_multi {
    type multi
    slaves.a.pcm "pistream_dac"
    slaves.a.channels 2
    slaves.b.pcm "pistream_loop"
    slaves.b.channels 2
    bindings.0.slave a
    bindings.0.channel 0
    bindings.1.slave a
    bindings.1.channel 1
    bindings.2.slave b
    bindings.2.channel 0
    bindings.3.slave b
    bindings.3.channel 1
}

# ...a route rozmnaża stereo 2ch na 4ch (L->0,2  P->1,3)
pcm.pistream_tee {
    type route
    slave.pcm "pistream_multi"
    slave.channels 4
    ttable.0.0 1
    ttable.1.1 1
    ttable.0.2 1
    ttable.1.3 1
}

# plug negocjuje format/częstotliwość — to w niego celują odtwarzacze
pcm.pistream {
    type plug
    slave.pcm "pistream_tee"
}

ctl.pistream {
    type hw
    card BossDAC
}
# PISTREAM-VIZ END
