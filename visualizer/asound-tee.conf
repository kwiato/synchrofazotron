# PISTREAM-VIZ BEGIN (block managed by visualizer/install.sh — do not edit by hand)
# The "pistream" device: plays on the DAC and simultaneously copies the stream
# into the snd-aloop loopback, which the visualizer (cava) reads from. Audio
# sources (squeezelite, shairport, bluealsa-aplay) target "pistream" instead
# of hw:BossDAC directly.

pcm.pistream_dac {
    type hw
    card BossDAC
    device 0
}

pcm.pistream_loop {
    type hw
    card Loopback
    device 0
    subdevice 0
}

# multi glues both devices into one 4-channel device...
pcm.pistream_multi {
    type multi
    slaves.a.pcm "pistream_dac"
    slaves.a.channels 2
    slaves.b.pcm "pistream_loop"
    slaves.b.channels 2
    bindings.0.slave a
    bindings.0.channel 0
    bindings.1.slave a
    bindings.1.channel 1
    bindings.2.slave b
    bindings.2.channel 0
    bindings.3.slave b
    bindings.3.channel 1
}

# ...and route fans stereo 2ch out to 4ch (L->0,2  R->1,3)
pcm.pistream_tee {
    type route
    slave.pcm "pistream_multi"
    slave.channels 4
    ttable.0.0 1
    ttable.1.1 1
    ttable.0.2 1
    ttable.1.3 1
}

# plug negotiates format/sample rate — this is what the players target
pcm.pistream {
    type plug
    slave.pcm "pistream_tee"
}

ctl.pistream {
    type hw
    card BossDAC
}
# PISTREAM-VIZ END
