# PISTREAM-VIZ BEGIN (block managed by visualizer/install.sh — do not edit by hand)
# The "pistream" device fans player audio into TWO snd-aloop loopback substreams:
#   Loopback,0,0 -> the visualizer (cava / glsl bridge) reads it at Loopback,1,0
#   Loopback,0,1 -> the pistream-aout bridge (alsaloop) reads it at Loopback,1,1
#                   and plays it to the real output card, where plughw does the
#                   PCM->IEC958 conversion HDMI needs (or plain PCM for a DAC).
# No real output card is referenced here on purpose: the audible card lives only
# in pistream-aout.service, so switching output never rewrites this file (and a
# dead/absent card can never make "pistream" unopenable — the classic silence).

pcm.pistream_loop0 { type hw; card Loopback; device 0; subdevice 0 }
pcm.pistream_loop1 { type hw; card Loopback; device 0; subdevice 1 }

# multi glues both loopbacks into one 4-channel device...
pcm.pistream_multi {
    type multi
    slaves.a.pcm "pistream_loop0"
    slaves.a.channels 2
    slaves.b.pcm "pistream_loop1"
    slaves.b.channels 2
    bindings.0.slave a
    bindings.0.channel 0
    bindings.1.slave a
    bindings.1.channel 1
    bindings.2.slave b
    bindings.2.channel 0
    bindings.3.slave b
    bindings.3.channel 1
}

# ...and route fans stereo 2ch out to 4ch (L->0,2  R->1,3)
pcm.pistream_tee {
    type route
    slave.pcm "pistream_multi"
    slave.channels 4
    ttable.0.0 1
    ttable.1.1 1
    ttable.0.2 1
    ttable.1.3 1
}

# plug negotiates format/sample rate — this is what the players target
pcm.pistream {
    type plug
    slave.pcm "pistream_tee"
}
# PISTREAM-VIZ END
