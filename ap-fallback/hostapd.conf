# Synchrofazotron setup AP — used only by net-watch.sh when Wi-Fi is down.
# If your Wi-Fi interface is not wlan0, change it here AND in dnsmasq.conf.
interface=wlan0
driver=nl80211
ssid=Synchrofazotron-Setup
hw_mode=g
channel=6
wmm_enabled=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
# Password for the setup network (min 8 chars). Not a secret in the usual
# sense — it only gates access to the setup page — but do not leave it open:
# the portal accepts your real Wi-Fi passwords.
wpa_passphrase=synchrofazotron
# Uncomment and adjust if hostapd complains about the regulatory domain:
#country_code=PL
