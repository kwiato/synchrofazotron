# Synchrofazotron setup AP — DHCP + captive DNS (every name resolves to the Pi).
# Started by net-watch.sh with an explicit --conf-file; never used otherwise.
interface=wlan0
bind-interfaces
listen-address=192.168.4.1
no-resolv
dhcp-range=192.168.4.10,192.168.4.99,1h
# Captive portal: answer every DNS query with our own address, so the phone's
# connectivity probe lands on the panel (port 80 is redirected via iptables).
address=/#/192.168.4.1
